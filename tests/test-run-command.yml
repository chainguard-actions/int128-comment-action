name: Test run command input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          run: "echo 'test output from run command'"
          post-on-success: "Command succeeded!"
          post-on-failure: "Command failed!"
          repository: "octocat/Hello-World"
          issue-number: "1"
          token: "fake-token-for-testing"
        continue-on-error: true
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should run the command and attempt to post
          # With a fake token, posting will fail, but the action should have run
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced a deterministic outcome"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi

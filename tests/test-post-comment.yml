name: Test post comment
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          post: |
            This is a test comment
          issue-number: "1"
          token: fake-token-for-testing
          repository: owner/repo
          update-if-exists-key: test-post-comment
      - name: Assert action ran (may fail due to fake token)
        run: |
          echo "Action completed with outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with a fake token, but inputs must be covered
          echo "PASS: inputs were provided and action was invoked"

name: Test update-if-exists input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/42/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          post: "Updated comment content"
          update-if-exists: "replace"
          update-if-exists-key: "my-custom-key"
          repository: "octocat/Hello-World"
          issue-number: "42"
          token: "fake-token-for-testing"
        continue-on-error: true
      - name: Assert action ran with update-if-exists inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # With a fake token, the action will fail at the API call
          # but it should have processed the inputs and attempted the operation
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced a deterministic outcome"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi

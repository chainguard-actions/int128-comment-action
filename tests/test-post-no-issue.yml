name: Test post with no issue number
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          post: "Hello from comment-action test"
          repository: "octocat/Hello-World"
          token: "fake-token-for-testing"
        continue-on-error: true
      - name: Assert action ran (no issue-number means no-op or graceful failure)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # Without an issue-number, the action should either succeed (no-op) or fail gracefully
          # Either outcome is acceptable — we just verify the action ran
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced a deterministic outcome"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
